<!DOCTYPE html>
<html>
<head>
    <title>Java Code Runner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        #editor {
            height: 400px;
            width: 100%;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
        #output {
            border: 1px solid #333;
            padding: 10px;
            height: 200px;
            overflow: auto;
            background-color: #f5f5f5;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
</head>
<body>
    <h1>Java Online Editor & Runner</h1>
    
    <div id="editor">public class Main {
    public static void main(String[] args) {
        System.out.println("Hello, World!");
    }
}</div>
    
    <button onclick="runJava()">Run Java Code</button>
    <h2>Output:</h2>
    <pre id="output"></pre>

    <script>
        // Initialize Ace Editor
        var editor = ace.edit("editor");
        editor.session.setMode("ace/mode/java");
        editor.setTheme("ace/theme/monokai");
        editor.setFontSize(14);

        // Run Java function
        async function runJava() {
            const outputEl = document.getElementById('output');
            outputEl.textContent = "⏳ Running...";
            
            const code = editor.getValue();
            
            try {
                const response = await fetch("https://api.jdoodle.com/v1/execute", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        clientId: "YOUR_CLIENT_ID",
                        clientSecret: "YOUR_CLIENT_SECRET",
                        script: code,
                        language: "java",
                        versionIndex: "4"
                    })
                });
                
                const data = await response.json();
                
                if (data.output) {
                    outputEl.textContent = data.output;
                } else if (data.error) {
                    outputEl.textContent = "❌ Error:\n" + data.error;
                } else {
                    outputEl.textContent = "No output";
                }
            } catch (error) {
                outputEl.textContent = "❌ Request failed: " + error.message;
            }
        }
    </script>
</body>
</html>
